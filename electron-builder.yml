appId: com.voxi.app
productName: Voxi
directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - dist/**/*
  - package.json

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  sign: false

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

publish:
  provider: github
